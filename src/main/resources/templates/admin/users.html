<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: head}">
    <title>User Management | ÉPURE Admin</title>
</head>
<body style="background: var(--bg-primary); display: flex;">
    <div th:replace="~{admin/dashboard :: admin-nav}"></div>

    <main style="margin-left: 280px; flex: 1; padding: 60px 5% 60px;">
        <div style="margin-bottom: 40px;">
            <h1 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px; color: var(--text-primary);">User Management</h1>
            <p style="color: var(--text-secondary); font-size: 1rem;">Manage registered users and their account statuses.</p>
        </div>

        <div style="background: white; border-radius: 24px; box-shadow: var(--shadow-medium); overflow: hidden; border: 1px solid rgba(0,0,0,0.05);">
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: separate; border-spacing: 0;">
                    <thead style="background: #fafaf9; border-bottom: 1px solid rgba(0,0,0,0.05);">
                        <tr>
                            <th style="padding: 25px 30px; text-align: left; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">Identifier</th>
                            <th style="padding: 25px 30px; text-align: left; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">User Info</th>
                            <th style="padding: 25px 30px; text-align: left; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">Email Address</th>
                            <th style="padding: 25px 30px; text-align: left; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">Assigned Roles</th>
                            <th style="padding: 25px 30px; text-align: center; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}" style="transition: all 0.3s; border-bottom: 1px solid rgba(0,0,0,0.03);" onmouseover="this.style.background='#fdfaf6'" onmouseout="this.style.background='transparent'">
                            <td style="padding: 20px 30px;">
                                <span style="font-family: 'Courier New', monospace; font-weight: 600; color: #8e7d6a;" th:text="'#' + ${user.id}">#1</span>
                            </td>
                            <td style="padding: 20px 30px;">
                                <div style="display: flex; align-items: center; gap: 15px;">
                                    <div th:text="${user.username != null && !user.username.isEmpty() ? #strings.substring(user.username,0,1).toUpperCase() : 'U'}" 
                                         style="width: 40px; height: 40px; border-radius: 50%; background: #f0edea; color: #5c4d3e; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">U</div>
                                    <div>
                                        <div th:text="${user.firstName + ' ' + user.lastName}" style="font-weight: 600; color: var(--text-primary);">Full Name</div>
                                        <div th:text="${user.username}" style="font-size: 0.8rem; color: #8e7d6a;">username</div>
                                    </div>
                                </div>
                            </td>
                            <td style="padding: 20px 30px; color: var(--text-secondary); font-size: 0.95rem;" th:text="${user.email}">user@example.com</td>
                            <td style="padding: 20px 30px;">
                                <div style="display: flex; gap: 6px; flex-wrap: wrap;">
                                    <span th:each="role : ${user.roles}" th:text="${#strings.replace(role.name, 'ROLE_', '')}" 
                                          style="background: #eef2ff; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; color: #4f46e5; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;"></span>
                                </div>
                            </td>
                            <td style="padding: 20px 30px; text-align: center;">
                                <div style="display: flex; gap: 15px; justify-content: center;">
                                    <a th:href="@{'/admin/users/delete/' + ${user.id}}" 
                                       style="color: #ef4444; font-size: 1.2rem; transition: transform 0.3s;" 
                                       onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"
                                       onclick="return confirm('Are you sure you want to delete this user?')">
                                        <i class="fa-regular fa-trash-can"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <style>
        @media (max-width: 992px) {
            main { margin-left: 0 !important; padding: 40px 2.5% !important; }
            .sidebar { display: none; }
        }
    </style>
</body>
</html>
