<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: head}">
    <title>Manage Products | ÉPURE Admin</title>
</head>
<body style="background: var(--bg-primary); display: flex;">
    <div th:replace="~{admin/dashboard :: admin-nav}"></div>

    <main style="margin-left: 280px; flex: 1; padding: 60px 5% 60px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <div>
                <h1 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px; color: var(--text-primary);">Product Management</h1>
                <p style="color: var(--text-secondary); font-size: 1rem;">Add, edit, or remove products from the ÉPURE collection.</p>
            </div>
            <a th:href="@{/admin/products/add}" class="btn" style="background: #2b1f18; color: #d8b892; padding: 12px 24px; border-radius: 12px; font-weight: 600; text-decoration: none; box-shadow: 0 4px 15px rgba(43, 31, 24, 0.2); transition: all 0.3s;">+ Add New Product</a>
        </div>

        <div style="background: white; border-radius: 24px; box-shadow: var(--shadow-medium); overflow: hidden; border: 1px solid rgba(0,0,0,0.05);">
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: separate; border-spacing: 0;">
                    <thead style="background: #fafaf9; border-bottom: 1px solid rgba(0,0,0,0.05);">
                        <tr>
                            <th style="padding: 25px 30px; text-align: left; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">Image</th>
                            <th style="padding: 25px 30px; text-align: left; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">Product Details</th>
                            <th style="padding: 25px 30px; text-align: left; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">Category</th>
                            <th style="padding: 25px 30px; text-align: left; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">Price</th>
                            <th style="padding: 25px 30px; text-align: left; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">Vibe</th>
                            <th style="padding: 25px 30px; text-align: center; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}" style="transition: all 0.3s; border-bottom: 1px solid rgba(0,0,0,0.03);" onmouseover="this.style.background='#fdfaf6'" onmouseout="this.style.background='transparent'">
                            <td style="padding: 20px 30px;">
                                <img th:src="${product.imageUrl}" style="width: 70px; height: 70px; object-fit: cover; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 2px solid white;">
                            </td>
                            <td style="padding: 20px 30px;">
                                <div th:text="${product.name}" style="font-weight: 600; color: var(--text-primary); font-size: 1.1rem;"></div>
                                <div th:text="${product.origin}" style="font-size: 0.8rem; color: #8e7d6a; margin-top: 4px;"></div>
                            </td>
                            <td style="padding: 20px 30px;">
                                <span th:text="${product.category.name}" style="background: #f0edea; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; color: #5c4d3e; font-weight: 600;"></span>
                            </td>
                            <td style="padding: 20px 30px; font-weight: 700; color: var(--text-primary);">₹<span th:text="${product.price}"></span></td>
                            <td style="padding: 20px 30px;">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span style="color: #d4af37; font-size: 0.9rem;"><i class="fa-solid fa-star"></i></span>
                                    <span th:text="${product.sustainabilityScore}" style="font-weight: 600; font-size: 0.95rem;"></span><span style="color:#6c757d; font-size:0.8rem;">/10</span>
                                </div>
                            </td>
                            <td style="padding: 20px 30px; text-align: center;">
                                <div style="display: flex; gap: 15px; justify-content: center;">
                                    <a th:href="@{'/admin/products/delete/' + ${product.id}}" 
                                       style="color: #ef4444; font-size: 1.2rem; transition: transform 0.3s;" 
                                       onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"
                                       onclick="return confirm('Are you sure you want to delete this product?')">
                                        <i class="fa-regular fa-trash-can"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${products.empty}">
                            <td colspan="6" style="padding: 100px; text-align: center; color: var(--text-secondary);">
                                No products found. Get started by adding one.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    
    <style>
        @media (max-width: 992px) {
            main { margin-left: 0 !important; padding: 40px 2.5% !important; }
            .sidebar { display: none; }
        }
    </style>
</body>
</html>
