<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: head}">
    <title>Manage Moodboards | ÉPURE Admin</title>
</head>
<body style="background: var(--bg-primary); display: flex;">
    <div th:replace="~{admin/dashboard :: admin-nav}"></div>

    <main style="margin-left: 280px; flex: 1; padding: 60px 5% 60px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <div>
                <h1 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px; color: var(--text-primary);">Moodboard Management</h1>
                <p style="color: var(--text-secondary); font-size: 1rem;">Create and curate interior scenes for the ÉPURE collection.</p>
            </div>
            <a th:href="@{/admin/moodboards/add}" class="btn" style="background: #2b1f18; color: #d8b892; padding: 12px 24px; border-radius: 12px; font-weight: 600; text-decoration: none; box-shadow: 0 4px 15px rgba(43, 31, 24, 0.2); transition: all 0.3s;">+ Add New Moodboard</a>
        </div>

        <div style="background: white; border-radius: 24px; box-shadow: var(--shadow-medium); overflow: hidden; border: 1px solid rgba(0,0,0,0.05);">
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: separate; border-spacing: 0;">
                    <thead style="background: #fafaf9; border-bottom: 1px solid rgba(0,0,0,0.05);">
                        <tr>
                            <th style="padding: 25px 30px; text-align: left; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">Cover</th>
                            <th style="padding: 25px 30px; text-align: left; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">Name</th>
                            <th style="padding: 25px 30px; text-align: left; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">Description</th>
                            <th style="padding: 25px 30px; text-align: left; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">Products</th>
                            <th style="padding: 25px 30px; text-align: center; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e7d6a;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="moodboard : ${moodboards}" style="transition: all 0.3s; border-bottom: 1px solid rgba(0,0,0,0.03);" onmouseover="this.style.background='#fdfaf6'" onmouseout="this.style.background='transparent'">
                            <td style="padding: 20px 30px;">
                                <img th:src="${moodboard.imageUrl}" style="width: 120px; height: 80px; object-fit: cover; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 2px solid white;">
                            </td>
                            <td style="padding: 20px 30px;">
                                <div th:text="${moodboard.name}" style="font-weight: 600; color: var(--text-primary); font-size: 1.1rem;"></div>
                            </td>
                            <td style="padding: 20px 30px; max-width: 300px;">
                                <div th:text="${#strings.abbreviate(moodboard.description, 100)}" style="font-size: 0.9rem; color: #8e7d6a; line-height: 1.5;"></div>
                            </td>
                            <td style="padding: 20px 30px;">
                                <span th:text="${moodboard.products.size()}" style="background: #f0edea; padding: 6px 14px; border-radius: 24px; font-size: 0.85rem; color: #5c4d3e; font-weight: 700;"></span> 
                                <span style="font-size: 0.85rem; color: #6c757d; font-weight: 500;">items linked</span>
                            </td>
                            <td style="padding: 20px 30px; text-align: center;">
                                <div style="display: flex; gap: 15px; justify-content: center;">
                                    <a th:href="@{'/admin/moodboards/delete/' + ${moodboard.id}}" 
                                       style="color: #ef4444; font-size: 1.2rem; transition: transform 0.3s;" 
                                       onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"
                                       onclick="return confirm('Are you sure you want to delete this moodboard?')">
                                        <i class="fa-regular fa-trash-can"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${moodboards.empty}">
                            <td colspan="5" style="padding: 100px; text-align: center; color: var(--text-secondary);">
                                No moodboards built yet. Start curating a new scene.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <style>
        @media (max-width: 992px) {
            main { margin-left: 0 !important; padding: 40px 2.5% !important; }
            .sidebar { display: none; }
        }
    </style>
</body>
</html>
