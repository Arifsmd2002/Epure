<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: head}">
    <title>Track Order | ÉPURE</title>
</head>
<body th:replace="~{layout :: layout(content=~{::main}, productId=null, productCategory=null)}">
    <main>
        <header style="padding: 160px 5% 60px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05);">
            <div data-aos="fade-down">
                <h1 style="font-size: 3.5rem; margin-bottom: 15px;">Track Your Sanctuary Pieces</h1>
                <p style="color: var(--text-secondary);">Follow the journey of your curated selections.</p>
            </div>
        </header>

        <section style="padding: 80px 10%; background: var(--bg-primary); min-height: 60vh;">
            <div style="max-width: 600px; margin: 0 auto; background: var(--white); padding: 50px; border-radius: 24px; box-shadow: var(--shadow-medium);" data-aos="fade-up">
                <div id="track-form">
                    <h2 style="font-size: 1.5rem; margin-bottom: 30px; text-align: center;">Enter your order details</h2>
                    <div style="display: grid; gap: 20px; margin-bottom: 30px;">
                        <div>
                            <label style="display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 10px;">Order ID</label>
                            <input type="text" id="order-id-input" placeholder="e.g. 1" style="width: 100%; padding: 15px 20px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); outline: none;">
                        </div>
                        <div>
                            <label style="display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 10px;">Email Address</label>
                            <input type="email" id="email-input" placeholder="erik@example.com" style="width: 100%; padding: 15px 20px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); outline: none;">
                        </div>
                    </div>
                    <button onclick="trackOrder()" class="btn btn-primary" style="width: 100%; height: 60px; background: var(--text-primary); color: var(--white); font-weight: 600;">Track Journey</button>
                </div>

                <div id="track-result" style="display: none;">
                    <div style="text-align: center; margin-bottom: 40px;">
                        <p style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px;">Order Status</p>
                        <h3 id="status-text" style="font-size: 2rem; margin-top: 10px;">Processing</h3>
                    </div>

                    <div class="tracking-stepper" style="display: flex; flex-direction: column; gap: 30px; position: relative; margin-top: 40px;">
                        <div class="step" data-status="ORDER_PLACED">
                            <div style="display: flex; gap: 20px; align-items: center;">
                                <div class="step-icon" style="width: 40px; height: 40px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-receipt"></i></div>
                                <div>
                                    <h4 style="font-size: 1rem; margin: 0;">Order Placed</h4>
                                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin: 5px 0 0;">Received and verified</p>
                                </div>
                            </div>
                        </div>
                        <div class="step" data-status="PROCESSING">
                            <div style="display: flex; gap: 20px; align-items: center;">
                                <div class="step-icon" style="width: 40px; height: 40px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-box-open"></i></div>
                                <div>
                                    <h4 style="font-size: 1rem; margin: 0;">Processing</h4>
                                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin: 5px 0 0;">Curating your pieces</p>
                                </div>
                            </div>
                        </div>
                        <div class="step" data-status="SHIPPED">
                            <div style="display: flex; gap: 20px; align-items: center;">
                                <div class="step-icon" style="width: 40px; height: 40px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-truck"></i></div>
                                <div>
                                    <h4 style="font-size: 1rem; margin: 0;">Shipped</h4>
                                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin: 5px 0 0;">Left our studio</p>
                                </div>
                            </div>
                        </div>
                        <div class="step" data-status="OUT_FOR_DELIVERY">
                            <div style="display: flex; gap: 20px; align-items: center;">
                                <div class="step-icon" style="width: 40px; height: 40px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-house-chimney"></i></div>
                                <div>
                                    <h4 style="font-size: 1rem; margin: 0;">Out for Delivery</h4>
                                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin: 5px 0 0;">Arriving today</p>
                                </div>
                            </div>
                        </div>
                        <div class="step" data-status="DELIVERED">
                            <div style="display: flex; gap: 20px; align-items: center;">
                                <div class="step-icon" style="width: 40px; height: 40px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-circle-check"></i></div>
                                <div>
                                    <h4 style="font-size: 1rem; margin: 0;">Delivered</h4>
                                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin: 5px 0 0;">Enjoy your sanctuary</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button onclick="document.getElementById('track-result').style.display='none'; document.getElementById('track-form').style.display='block';" class="btn" style="margin-top: 50px; width: 100%; border: 1px solid rgba(0,0,0,0.1); padding: 15px;">Track Another Order</button>
                </div>
            </div>
        </section>

        <script>
            async function trackOrder() {
                const orderId = document.getElementById('order-id-input').value;
                const email = document.getElementById('email-input').value;

                if (!orderId || !email) {
                    alert('Please enter both Order ID and Email.');
                    return;
                }

                try {
                    const response = await fetch(`/api/orders/track/${orderId}?email=${encodeURIComponent(email)}`);
                    if (!response.ok) throw new Error('Order not found');
                    
                    const order = await response.json();
                    
                    if (!order) {
                        alert('Order details do not match our records.');
                        return;
                    }

                    document.getElementById('track-form').style.display = 'none';
                    document.getElementById('track-result').style.display = 'block';

                    const statusMap = {
                        "ORDER_PLACED": "Order Placed",
                        "PROCESSING": "Processing",
                        "SHIPPED": "Shipped",
                        "OUT_FOR_DELIVERY": "Out for Delivery",
                        "DELIVERED": "Delivered"
                    };
                    document.getElementById('status-text').textContent = statusMap[order.orderStatus] || order.orderStatus;

                    // Update stepper UI
                    const steps = document.querySelectorAll('.step');
                    let activeReached = false;
                    const statusOrder = ["ORDER_PLACED", "PROCESSING", "SHIPPED", "OUT_FOR_DELIVERY", "DELIVERED"];
                    const currentStatusIdx = statusOrder.indexOf(order.orderStatus);

                    steps.forEach((step, idx) => {
                        const icon = step.querySelector('.step-icon');
                        if (idx <= currentStatusIdx) {
                            icon.style.background = 'var(--text-primary)';
                            icon.style.color = 'var(--white)';
                            step.style.opacity = '1';
                        } else {
                            icon.style.background = '#eee';
                            icon.style.color = 'var(--text-secondary)';
                            step.style.opacity = '0.5';
                        }
                    });

                } catch (error) {
                    alert('Could not find order. Please verify your details.');
                }
            }
        </script>
    </main>
</body>
</html>
